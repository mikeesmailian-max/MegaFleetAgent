document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 1px solid var(--border);\n    flex-wrap: wrap;\n  }\n  .stat-item {}\n  .stat-num {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 52px; font-weight: 900; color: #fff;\n    line-height: 1;\n  }\n  .stat-num span { color: var(--red); }\n  .stat-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }\n\n  /* \u2500\u2500 SECTIONS \u2500\u2500 */\n  section { padding: 100px 48px; }\n  .section-label {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 12px; font-weight: 700; letter-spacing: 0.25em;\n    text-transform: uppercase; color: var(--red);\n    margin-bottom: 16px;\n  }\n  h2 {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: clamp(36px, 5vw, 64px);\n    font-weight: 900; text-transform: uppercase;\n    line-height: 1; margin-bottom: 24px;\n  }\n\n  /* \u2500\u2500 WHO WE ARE \u2500\u2500 */\n  #about {\n    background: var(--dark2);\n    border-top: 1px solid var(--border);\n    border-bottom: 1px solid var(--border);\n  }\n  .about-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 80px; align-items: start;\n    max-width: 1100px;\n  }\n  .about-body { font-size: 17px; color: var(--light); line-height: 1.8; font-weight: 300; }\n  .about-body p + p { margin-top: 20px; }\n  .about-body strong { color: #fff; font-weight: 600; }\n  .about-points { display: flex; flex-direction: column; gap: 20px; margin-top: 8px; }\n  .about-point {\n    display: flex; align-items: flex-start; gap: 16px;\n    padding: 20px 24px;\n    background: var(--dark3);\n    border-left: 3px solid var(--red);\n  }\n  .about-point-icon {\n    font-size: 22px; line-height: 1;\n    flex-shrink: 0; margin-top: 2px;\n    color: var(--red);\n  }\n  .about-point-title {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 18px; font-weight: 700;\n    text-transform: uppercase; letter-spacing: 0.05em;\n    margin-bottom: 4px;\n  }\n  .about-point-desc { font-size: 14px; color: var(--muted); line-height: 1.6; }\n\n  /* \u2500\u2500 COMMISSION \u2500\u2500 */\n  #commission {}\n  .commission-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 2px;\n    max-width: 860px;\n    margin-bottom: 60px;\n  }\n  .commission-card {\n    background: var(--dark2);\n    padding: 48px 40px;\n    position: relative; overflow: hidden;\n  }\n  .commission-card.featured {\n    background: var(--red);\n  }\n  .commission-card.featured .tier-label,\n  .commission-card.featured .tier-note { color: rgba(255,255,255,0.75); }\n  .tier-label {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 13px; font-weight: 700; letter-spacing: 0.2em;\n    text-transform: uppercase; color: var(--muted);\n    margin-bottom: 12px;\n  }\n  .tier-split {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 80px; font-weight: 900; line-height: 1;\n    color: #fff;\n  }\n  .tier-note {\n    font-size: 15px; color: var(--light); margin-top: 12px; line-height: 1.5;\n  }\n\n  /* \u2500\u2500 CALCULATOR \u2500\u2500 */\n  #calculator {\n    background: var(--dark2);\n    border-top: 1px solid var(--border);\n    border-bottom: 1px solid var(--border);\n  }\n  .calc-wrap {\n    max-width: 720px;\n  }\n  .calc-intro {\n    font-size: 16px; color: var(--light); margin-bottom: 40px; font-weight: 300;\n  }\n  .calc-body {\n    background: var(--dark3);\n    padding: 40px;\n  }\n  .calc-field { margin-bottom: 28px; }\n  .calc-field label {\n    display: block;\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 13px; font-weight: 700;\n    letter-spacing: 0.15em; text-transform: uppercase;\n    color: var(--muted); margin-bottom: 10px;\n  }\n  .calc-field input[type=\"range\"] {\n    width: 100%; appearance: none;\n    height: 4px; background: var(--dark);\n    outline: none; border-radius: 0;\n    accent-color: var(--red);\n  }\n  .calc-field input[type=\"range\"]::-webkit-slider-thumb {\n    appearance: none;\n    width: 18px; height: 18px;\n    background: var(--red); cursor: pointer;\n    border-radius: 0;\n    border: 2px solid #fff;\n  }\n  .calc-value {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 28px; font-weight: 800; color: #fff;\n    margin-bottom: 8px;\n  }\n  .calc-divider { height: 1px; background: var(--border); margin: 32px 0; }\n  .calc-result-grid {\n    display: grid; grid-template-columns: 1fr 1fr; gap: 2px;\n  }\n  .calc-result-item {\n    background: var(--dark);\n    padding: 24px 28px;\n  }\n  .calc-result-label {\n    font-size: 12px; text-transform: uppercase; letter-spacing: 0.15em;\n    color: var(--muted); margin-bottom: 8px;\n  }\n  .calc-result-num {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 42px; font-weight: 900; color: #fff; line-height: 1;\n  }\n  .calc-result-num.highlight { color: var(--red); }\n  .calc-result-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }\n\n  /* \u2500\u2500 HOW IT WORKS \u2500\u2500 */\n  #how {\n    border-bottom: 1px solid var(--border);\n  }\n  .steps {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 2px;\n    max-width: 1000px;\n    margin-top: 48px;\n  }\n  .step {\n    background: var(--dark2);\n    padding: 40px 36px;\n    position: relative;\n  }\n  .step-num {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 80px; font-weight: 900;\n    color: rgba(196,18,48,0.2);\n    line-height: 1; margin-bottom: 24px;\n    letter-spacing: -0.02em;\n  }\n  .step-title {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 22px; font-weight: 700;\n    text-transform: uppercase; letter-spacing: 0.05em;\n    margin-bottom: 12px; color: #fff;\n  }\n  .step-desc { font-size: 14px; color: var(--muted); line-height: 1.7; }\n\n  /* \u2500\u2500 APPLY FORM \u2500\u2500 */\n  #apply {\n    background: var(--dark2);\n    border-top: 1px solid var(--border);\n  }\n  .apply-grid {\n    display: grid;\n    grid-template-columns: 1fr 1.2fr;\n    gap: 80px;\n    max-width: 1100px;\n    align-items: start;\n  }\n  .apply-left h2 { margin-bottom: 20px; }\n  .apply-left p { font-size: 16px; color: var(--light); font-weight: 300; line-height: 1.8; margin-bottom: 32px; }\n  .apply-promise {\n    display: flex; flex-direction: column; gap: 16px;\n  }\n  .promise-item {\n    display: flex; align-items: center; gap: 14px;\n    font-size: 14px; color: var(--light);\n  }\n  .promise-dot {\n    width: 6px; height: 6px;\n    background: var(--red); flex-shrink: 0;\n  }\n  form { display: flex; flex-direction: column; gap: 16px; }\n  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }\n  .form-field { display: flex; flex-direction: column; gap: 6px; }\n  .form-field label {\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 12px; font-weight: 700;\n    letter-spacing: 0.15em; text-transform: uppercase;\n    color: var(--muted);\n  }\n  .form-field input,\n  .form-field select,\n  .form-field textarea {\n    background: var(--dark3);\n    border: 1px solid var(--border);\n    color: var(--text);\n    font-family: 'DM Sans', sans-serif;\n    font-size: 15px;\n    padding: 12px 16px;\n    outline: none;\n    transition: border-color 0.2s;\n    border-radius: 0;\n    appearance: none;\n  }\n  .form-field input:focus,\n  .form-field select:focus,\n  .form-field textarea:focus { border-color: var(--red); }\n  .form-field select option { background: var(--dark3); }\n  .form-field textarea { resize: vertical; min-height: 100px; }\n  .form-submit {\n    background: var(--red);\n    color: #fff;\n    border: none; cursor: pointer;\n    font-family: 'Barlow Condensed', sans-serif;\n    font-size: 18px; font-weight: 700;\n    letter-spacing: 0.1em; text-transform: uppercase;\n    padding: 16px 40px;\n    transition: background 0.2s, transform 0.15s;\n    align-self: flex-start;\n    margin-top: 8px;\n  }\n  .form-submit:hover { background: var(--red-bright); transform: translateY(-2px); }\n  .form-disclaimer { font-size: 12px; color: var(--muted); margin-top: 4px; }\n\n  /* \u2500\u2500 FOOTER \u2500\u2500 */\n  footer {\n    padding: 32px 48px;\n    border-top: 1px solid var(--border);\n    display: flex; align-items: center; justify-content: space-between;\n    flex-wrap: wrap; gap: 16px;\n  }\n  .footer-logo { display: flex; align-items: center; gap: 8px; opacity: 0.55; text-decoration: none; }\n  .footer-logo-mark { width: 28px; height: 28px; }\n  .footer-logo-text { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 900; letter-spacing: 0.04em; color: #fff; }\n  .footer-logo-text em { color: var(--red); font-style: normal; }\n  footer p { font-size: 13px; color: var(--muted); }\n\n  /* \u2500\u2500 ANIMATIONS \u2500\u2500 */\n  .fade-up {\n    opacity: 0; transform: translateY(24px);\n    transition: opacity 0.6s ease, transform 0.6s ease;\n  }\n  .fade-up.visible { opacity: 1; transform: translateY(0); }\n\n  /* \u2500\u2500 RESPONSIVE \u2500\u2500 */\n  @media (max-width: 768px) {\n    nav { padding: 14px 20px; }\n    #hero, section { padding-left: 20px; padding-right: 20px; }\n    .about-grid, .commission-grid, .steps, .apply-grid, .form-row,\n    .calc-result-grid { grid-template-columns: 1fr; }\n    .hero-stats { gap: 32px; }\n    .commission-grid { gap: 8px; }\n  }\n</style>\n</head>\n<body>\n\n<!-- NAV -->\n<nav>\n  <a href=\"#\" class=\"nav-logo\">\n    <svg height=\"48\" viewBox=\"0 0 260 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n      <!-- Red forward chevron accent -->\n      <polygon points=\"0,4 10,4 22,24 10,44 0,44 12,24\" fill=\"#C41230\"></polygon>\n      <polygon points=\"10,4 20,4 32,24 20,44 10,44 22,24\" fill=\"#C41230\" opacity=\"0.45\"></polygon>\n      <!-- MEGA -->\n      <text x=\"38\" y=\"32\" font-family=\"'Barlow Condensed', sans-serif\" font-weight=\"900\" font-size=\"32\" letter-spacing=\"2\" fill=\"white\" text-anchor=\"start\">MEGA</text>\n      <!-- FLEET -->\n      <text x=\"115\" y=\"32\" font-family=\"'Barlow Condensed', sans-serif\" font-weight=\"900\" font-size=\"32\" letter-spacing=\"2\" fill=\"#C41230\" text-anchor=\"start\">FLEET</text>\n      <!-- CORP + divider -->\n      <rect x=\"38\" y=\"37\" width=\"190\" height=\"1\" fill=\"rgba(255,255,255,0.15)\"></rect>\n      <text x=\"38\" y=\"46\" font-family=\"'Barlow Condensed', sans-serif\" font-weight=\"700\" font-size=\"10\" letter-spacing=\"4\" fill=\"#888\" text-anchor=\"start\">CORP \u2022 EST. 2001</text>\n    </svg>\n  </a>\n  <a href=\"#apply\" class=\"nav-cta\">Apply Now</a>\n</nav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-bg\"></div>\n  <div class=\"hero-accent\"></div>\n\n  <div class=\"hero-label\">Freight Broker Opportunity</div>\n\n  <h1>We Don't<br>Want <em>Agents.</em><br>We Want <em>Partners.</em></h1>\n\n  <p class=\"hero-sub\">\n    Mega Fleet Corp has spent 25 years building one of the most trusted names in freight. Now we're opening the door to independent brokers who are serious about growing a real book of business.\n  </p>\n\n  <div class=\"hero-actions\">\n    <a href=\"#apply\" class=\"btn-primary\">Apply Now</a>\n    <span class=\"hero-note\">No desk fees. No nonsense. Just commission.</span>\n  </div>\n\n  <div class=\"hero-stats\">\n    <div class=\"stat-item\">\n      <div class=\"stat-num\">25<span>+</span></div>\n      <div class=\"stat-label\">Years in Business</div>\n    </div>\n    <div class=\"stat-item\">\n      <div class=\"stat-num\">50<span>/50</span></div>\n      <div class=\"stat-label\">Starting Split</div>\n    </div>\n    <div class=\"stat-item\">\n      <div class=\"stat-num\">60<span>/40</span></div>\n      <div class=\"stat-label\">High Volume Split</div>\n    </div>\n    <div class=\"stat-item\">\n      <div class=\"stat-num\">24<span>hr</span></div>\n      <div class=\"stat-label\">Broker Support</div>\n    </div>\n  </div>\n</section>\n\n<!-- ABOUT -->\n<section id=\"about\">\n  <div class=\"about-grid fade-up\">\n    <div>\n      <div class=\"section-label\">Who We Are</div>\n      <h2>Built on<br>25 Years of<br>Moving Freight</h2>\n      <div class=\"about-body\">\n        <p>\n          Mega Fleet Corp holds <strong>dual MC authority</strong> as both a licensed carrier and freight broker. That's not something most brokerages can say \u2014 and it means our partners have access to infrastructure that independent agents simply don't get anywhere else.\n        </p>\n        <p>\n          We're not a body shop. We don't churn through agents. We bring on <strong>business-minded partners</strong> who want to build something lasting \u2014 and we give them everything they need to do it.\n        </p>\n      </div>\n    </div>\n    <div class=\"about-points\">\n      <div class=\"about-point\">\n        <div class=\"about-point-icon\">\u25c6</div>\n        <div>\n          <div class=\"about-point-title\">Dual MC Authority</div>\n          <div class=\"about-point-desc\">Licensed as both carrier and broker. Your clients get more solutions. You get a stronger pitch.</div>\n        </div>\n      </div>\n      <div class=\"about-point\">\n        <div class=\"about-point-icon\">\u25c6</div>\n        <div>\n          <div class=\"about-point-title\">24-Hour Support</div>\n          <div class=\"about-point-desc\">Round-the-clock back-office and operations support so you can close deals at any hour.</div>\n        </div>\n      </div>\n      <div class=\"about-point\">\n        <div class=\"about-point-icon\">\u25c6</div>\n        <div>\n          <div class=\"about-point-title\">Business Partners, Not Headcount</div>\n          <div class=\"about-point-desc\">We invest in your growth. Your success is ours. That's not a slogan \u2014 it's how we structure every deal.</div>\n        </div>\n      </div>\n      <div class=\"about-point\">\n        <div class=\"about-point-icon\">\u25c6</div>\n        <div>\n          <div class=\"about-point-title\">Established Carrier Network</div>\n          <div class=\"about-point-desc\">25 years of vetted carrier relationships means you can cover loads others can't.</div>\n        </div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- COMMISSION -->\n<section id=\"commission\">\n  <div class=\"fade-up\">\n    <div class=\"section-label\">Commission Structure</div>\n    <h2>Straightforward<br>Splits. No Surprises.</h2>\n    <p style=\"color:var(--light);font-weight:300;font-size:17px;max-width:500px;margin-bottom:48px;line-height:1.7;\">\n      Start at 50/50. Grow your volume and move to 60/40. The more you produce, the more you keep.\n    </p>\n\n    <div class=\"commission-grid\">\n      <div class=\"commission-card\">\n        <div class=\"tier-label\">Standard</div>\n        <div class=\"tier-split\">50/50</div>\n        <div class=\"tier-note\">You keep 50% of gross margin on every load from day one. No minimums to get started.</div>\n      </div>\n      <div class=\"commission-card featured\">\n        <div class=\"tier-label\">High Volume</div>\n        <div class=\"tier-split\">60/40</div>\n        <div class=\"tier-note\">Hit high-volume milestones and your split improves. Build the book, earn more of it.</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- CALCULATOR -->\n<section id=\"calculator\">\n  <div class=\"calc-wrap fade-up\">\n    <div class=\"section-label\">Earnings Estimator</div>\n    <h2>What Can<br>You Earn?</h2>\n    <p class=\"calc-intro\">Estimate your annual income based on monthly load volume and average margin per load.</p>\n\n    <div class=\"calc-body\">\n      <div class=\"calc-field\">\n        <label>Loads Per Month: <span id=\"loads-display\">40</span></label>\n        <div class=\"calc-value\" id=\"loads-value\">40 loads/mo</div>\n        <input type=\"range\" id=\"loads-slider\" min=\"5\" max=\"200\" step=\"5\" value=\"40\" oninput=\"updateCalc()\">\n      </div>\n\n      <div class=\"calc-field\">\n        <label>Average Gross Margin Per Load: <span id=\"margin-display\">$350</span></label>\n        <div class=\"calc-value\" id=\"margin-value\">$350 avg. margin</div>\n        <input type=\"range\" id=\"margin-slider\" min=\"100\" max=\"1500\" step=\"25\" value=\"350\" oninput=\"updateCalc()\">\n      </div>\n\n      <div class=\"calc-field\">\n        <label>Commission Tier</label>\n        <select id=\"tier-select\" onchange=\"updateCalc()\">\n          <option value=\"0.5\">Standard (50/50)</option>\n          <option value=\"0.6\">High Volume (60/40)</option>\n        </select>\n      </div>\n\n      <div class=\"calc-divider\"></div>\n\n      <div class=\"calc-result-grid\">\n        <div class=\"calc-result-item\">\n          <div class=\"calc-result-label\">Monthly Gross Margin</div>\n          <div class=\"calc-result-num\" id=\"monthly-gross\">$14,000</div>\n          <div class=\"calc-result-sub\">Before split</div>\n        </div>\n        <div class=\"calc-result-item\">\n          <div class=\"calc-result-label\">Your Monthly Take-Home</div>\n          <div class=\"calc-result-num highlight\" id=\"monthly-take\">$7,000</div>\n          <div class=\"calc-result-sub\" id=\"monthly-pct\">at 50% split</div>\n        </div>\n        <div class=\"calc-result-item\">\n          <div class=\"calc-result-label\">Annual Gross Margin</div>\n          <div class=\"calc-result-num\" id=\"annual-gross\">$168,000</div>\n          <div class=\"calc-result-sub\">Total book value</div>\n        </div>\n        <div class=\"calc-result-item\">\n          <div class=\"calc-result-label\">Annual Take-Home</div>\n          <div class=\"calc-result-num highlight\" id=\"annual-take\">$84,000</div>\n          <div class=\"calc-result-sub\">Your estimated earnings</div>\n        </div>\n      </div>\n    </div>\n    <p style=\"font-size:12px;color:var(--muted);margin-top:16px;\">Estimates only. Actual earnings depend on load volume, lane rates, and market conditions.</p>\n  </div>\n</section>\n\n<!-- HOW IT WORKS -->\n<section id=\"how\">\n  <div class=\"fade-up\">\n    <div class=\"section-label\">Getting Started</div>\n    <h2>Three Steps<br>to Your First Load</h2>\n\n    <div class=\"steps\">\n      <div class=\"step\">\n        <div class=\"step-num\">01</div>\n        <div class=\"step-title\">Apply &amp; Connect</div>\n        <div class=\"step-desc\">Submit your application below. We'll reach out within 1 business day to schedule a straight-talk conversation about fit, terms, and your book of business.</div>\n      </div>\n      <div class=\"step\">\n        <div class=\"step-num\">02</div>\n        <div class=\"step-title\">Onboard Fast</div>\n        <div class=\"step-desc\">Once aligned, we get you set up quickly \u2014 TMS access, back-office support, legal agreements, and carrier network access. No lengthy corporate onboarding.</div>\n      </div>\n      <div class=\"step\">\n        <div class=\"step-num\">03</div>\n        <div class=\"step-title\">Start Moving Freight</div>\n        <div class=\"step-desc\">You bring the customers and hustle. We bring the infrastructure, authority, and 24-hour support. Split the revenue. Build your business.</div>\n      </div>\n    </div>\n  </div>\n</section>\n\n<!-- APPLY FORM -->\n<section id=\"apply\">\n  <div class=\"apply-grid fade-up\">\n    <div class=\"apply-left\">\n      <div class=\"section-label\">Apply Now</div>\n      <h2>Let's Talk<br>Business</h2>\n      <p>If you're a seasoned broker or an independent agent ready to operate at a higher level, we want to hear from you. Fill out the form and we'll be in touch within 24 hours.</p>\n      <div class=\"apply-promise\">\n        <div class=\"promise-item\">\n          <div class=\"promise-dot\"></div>\n          <span>No desk fees or hidden deductions</span>\n        </div>\n        <div class=\"promise-item\">\n          <div class=\"promise-dot\"></div>\n          <span>24-hour operations support</span>\n        </div>\n        <div class=\"promise-item\">\n          <div class=\"promise-dot\"></div>\n          <span>Access to dual-authority MC network</span>\n        </div>\n        <div class=\"promise-item\">\n          <div class=\"promise-dot\"></div>\n          <span>You own your customer relationships</span>\n        </div>\n        <div class=\"promise-item\">\n          <div class=\"promise-dot\"></div>\n          <span>Transparent, simple commission splits</span>\n        </div>\n      </div>\n    </div>\n    <form id=\"apply-form\" onsubmit=\"handleSubmit(event)\">\n      <div class=\"form-row\">\n        <div class=\"form-field\">\n          <label>First Name</label>\n          <input type=\"text\" name=\"first\" placeholder=\"John\" required=\"\">\n        </div>\n        <div class=\"form-field\">\n          <label>Last Name</label>\n          <input type=\"text\" name=\"last\" placeholder=\"Smith\" required=\"\">\n        </div>\n      </div>\n      <div class=\"form-field\">\n        <label>Email Address</label>\n        <input type=\"email\" name=\"email\" placeholder=\"john@example.com\" required=\"\">\n      </div>\n      <div class=\"form-field\">\n        <label>Phone Number</label>\n        <input type=\"tel\" name=\"phone\" placeholder=\"(555) 000-0000\">\n      </div>\n      <div class=\"form-field\">\n        <label>Years of Freight Brokerage Experience</label>\n        <select name=\"experience\">\n          <option value=\"\">Select...</option>\n          <option>Less than 1 year</option>\n          <option>1\u20133 years</option>\n          <option>3\u20135 years</option>\n          <option>5\u201310 years</option>\n          <option>10+ years</option>\n        </select>\n      </div>\n      <div class=\"form-field\">\n        <label>Current Monthly Load Volume (approx.)</label>\n        <select name=\"volume\">\n          <option value=\"\">Select...</option>\n          <option>Just getting started</option>\n          <option>Under 20 loads/month</option>\n          <option>20\u201350 loads/month</option>\n          <option>50\u2013100 loads/month</option>\n          <option>100+ loads/month</option>\n        </select>\n      </div>\n      <div class=\"form-field\">\n        <label>Tell us about yourself (optional)</label>\n        <textarea name=\"message\" placeholder=\"Your background, what you're looking for, any questions...\"></textarea>\n      </div>\n      <button type=\"submit\" class=\"form-submit\" id=\"submit-btn\">Submit Application</button>\n      <p class=\"form-disclaimer\">We respond within 1 business day. Your info is never shared.</p>\n    </form>\n  </div>\n</section>\n\n<!-- FOOTER -->\n<footer>\n  <a href=\"#\" class=\"footer-logo\">\n    <svg height=\"36\" viewBox=\"0 0 260 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n      <polygon points=\"0,4 10,4 22,24 10,44 0,44 12,24\" fill=\"#C41230\"></polygon>\n      <polygon points=\"10,4 20,4 32,24 20,44 10,44 22,24\" fill=\"#C41230\" opacity=\"0.45\"></polygon>\n      <text x=\"38\" y=\"32\" font-family=\"'Barlow Condensed', sans-serif\" font-weight=\"900\" font-size=\"32\" letter-spacing=\"2\" fill=\"white\" text-anchor=\"start\">MEGA</text>\n      <text x=\"115\" y=\"32\" font-family=\"'Barlow Condensed', sans-serif\" font-weight=\"900\" font-size=\"32\" letter-spacing=\"2\" fill=\"#C41230\" text-anchor=\"start\">FLEET</text>\n      <rect x=\"38\" y=\"37\" width=\"190\" height=\"1\" fill=\"rgba(255,255,255,0.15)\"></rect>\n      <text x=\"38\" y=\"46\" font-family=\"'Barlow Condensed', sans-serif\" font-weight=\"700\" font-size=\"10\" letter-spacing=\"4\" fill=\"#888\" text-anchor=\"start\">CORP \u2022 EST. 2001</text>\n    </svg>\n  </a>\n  <p>\u00a9 2026 Mega Fleet Corp. All rights reserved.</p>\n</footer>\n\n<!-- TWEAKS PANEL -->\n<div id=\"tweaks-panel\" style=\"display:none; position:fixed; bottom:24px; right:24px; z-index:999;\n  background:#1c1c1c; border:1px solid rgba(255,255,255,0.12); padding:24px; min-width:240px;\n  font-family:'DM Sans',sans-serif;\">\n  <div style=\"font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#888;margin-bottom:18px;\">Tweaks</div>\n  <div style=\"margin-bottom:16px;\">\n    <label style=\"font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:#666;display:block;margin-bottom:6px;\">Accent Color</label>\n    <input type=\"color\" id=\"tweak-color\" value=\"#C41230\" style=\"width:100%;height:36px;border:none;background:none;cursor:pointer;padding:0;\">\n  </div>\n  <div style=\"margin-bottom:16px;\">\n    <label style=\"font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:#666;display:block;margin-bottom:6px;\">Hero Headline Style</label>\n    <select id=\"tweak-headline\" style=\"width:100%;background:#242424;border:1px solid rgba(255,255,255,0.08);color:#f0eeeb;padding:8px;font-family:'DM Sans',sans-serif;font-size:14px;\">\n      <option value=\"partners\">We Don't Want Agents. We Want Partners.</option>\n      <option value=\"earn\">Earn More. Keep More. Build More.</option>\n      <option value=\"open\">25 Years of Freight. Now Open to Partners.</option>\n    </select>\n  </div>\n  <div>\n    <label style=\"font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:#666;display:block;margin-bottom:6px;\">Background</label>\n    <select id=\"tweak-bg\" style=\"width:100%;background:#242424;border:1px solid rgba(255,255,255,0.08);color:#f0eeeb;padding:8px;font-family:'DM Sans',sans-serif;font-size:14px;\">\n      <option value=\"dark\">Near Black (Default)</option>\n      <option value=\"navy\">Deep Navy</option>\n      <option value=\"slate\">Dark Slate</option>\n    </select>\n  </div>\n</div>\n\n<script>\n// \u2500\u2500 CALCULATOR \u2500\u2500\nfunction fmt(n) {\n  return '$' + Math.round(n).toLocaleString();\n}\nfunction updateCalc() {\n  const loads = parseInt(document.getElementById('loads-slider').value);\n  const margin = parseInt(document.getElementById('margin-slider').value);\n  const tier = parseFloat(document.getElementById('tier-select').value);\n  const pct = Math.round(tier * 100);\n\n  document.getElementById('loads-value').textContent = loads + ' loads/mo';\n  document.getElementById('margin-value').textContent = '$' + margin + ' avg. margin';\n\n  const monthlyGross = loads * margin;\n  const monthlyTake = monthlyGross * tier;\n  const annualGross = monthlyGross * 12;\n  const annualTake = monthlyTake * 12;\n\n  document.getElementById('monthly-gross').textContent = fmt(monthlyGross);\n  document.getElementById('monthly-take').textContent = fmt(monthlyTake);\n  document.getElementById('monthly-pct').textContent = 'at ' + pct + '% split';\n  document.getElementById('annual-gross').textContent = fmt(annualGross);\n  document.getElementById('annual-take').textContent = fmt(annualTake);\n}\n\n// \u2500\u2500 FORM SUBMIT \u2500\u2500\nasync function handleSubmit(e) {\n  e.preventDefault();\n  const form = e.target;\n  const btn = document.getElementById('submit-btn');\n  const data = new FormData(form);\n\n  const payload = {\n    first:      data.get('first')      || '',\n    last:       data.get('last')       || '',\n    email:      data.get('email')      || '',\n    phone:      data.get('phone')      || '',\n    experience: data.get('experience') || '',\n    volume:     data.get('volume')     || '',\n    message:    data.get('message')    || '',\n  };\n\n  btn.textContent = 'Sending...';\n  btn.disabled = true;\n  btn.style.opacity = '0.7';\n\n  try {\n    const res = await fetch('send.php', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify(payload),\n    });\n    const result = await res.json();\n    if (result.success) {\n      btn.textContent = 'Application Sent \u2713';\n      btn.style.background = '#2a7a3a';\n      btn.style.opacity = '1';\n      form.reset();\n    } else {\n      throw new Error(result.error || 'Unknown error');\n    }\n  } catch (err) {\n    btn.textContent = 'Error \u2014 Try Again';\n    btn.style.background = '#7a2a2a';\n    btn.style.opacity = '1';\n    btn.disabled = false;\n    console.error('Form error:', err);\n  }\n}\n\n// \u2500\u2500 SCROLL ANIMATIONS \u2500\u2500\nconst observer = new IntersectionObserver((entries) => {\n  entries.forEach(el => {\n    if (el.isIntersecting) el.target.classList.add('visible');\n  });\n}, { threshold: 0.1 });\ndocument.querySelectorAll('.fade-up').forEach(el => observer.observe(el));\n\n// \u2500\u2500 TWEAKS \u2500\u2500\nconst TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n  \"accentColor\": \"#C41230\",\n  \"headline\": \"open\",\n  \"bg\": \"dark\"\n}/*EDITMODE-END*/;\n\nconst headlines = {\n  partners: [\"We Don't\", \"Want <em>Agents.</em>\", \"We Want <em>Partners.</em>\"],\n  earn: [\"Earn More.\", \"Keep More.\", \"<em>Build More.</em>\"],\n  open: [\"25 Years of\", \"Freight. Now\", \"<em>Open to Partners.</em>\"]\n};\n\nconst bgColors = {\n  dark: { black: '#0e0e0e', dark: '#141414', dark2: '#1c1c1c', dark3: '#242424' },\n  navy: { black: '#06101f', dark: '#0b1929', dark2: '#0f2035', dark3: '#152843' },\n  slate: { black: '#0d0f11', dark: '#131619', dark2: '#1a1e22', dark3: '#21262c' }\n};\n\nfunction applyTweaks(t) {\n  document.documentElement.style.setProperty('--red', t.accentColor);\n  document.documentElement.style.setProperty('--red-bright', t.accentColor);\n\n  const h1 = document.querySelector('#hero h1');\n  if (h1 && headlines[t.headline]) {\n    h1.innerHTML = headlines[t.headline].join('<br>');\n  }\n\n  const bg = bgColors[t.bg] || bgColors.dark;\n  document.documentElement.style.setProperty('--black', bg.black);\n  document.documentElement.style.setProperty('--dark', bg.dark);\n  document.documentElement.style.setProperty('--dark2', bg.dark2);\n  document.documentElement.style.setProperty('--dark3', bg.dark3);\n}\n\napplyTweaks(TWEAK_DEFAULTS);\n\nwindow.addEventListener('message', (e) => {\n  if (e.data?.type === '__activate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'block';\n  }\n  if (e.data?.type === '__deactivate_edit_mode') {\n    document.getElementById('tweaks-panel').style.display = 'none';\n  }\n});\nwindow.parent.postMessage({ type: '__edit_mode_available' }, '*');\n\ndocument.getElementById('tweak-color').addEventListener('input', (e) => {\n  TWEAK_DEFAULTS.accentColor = e.target.value;\n  applyTweaks(TWEAK_DEFAULTS);\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accentColor: e.target.value } }, '*');\n});\ndocument.getElementById('tweak-headline').addEventListener('change', (e) => {\n  TWEAK_DEFAULTS.headline = e.target.value;\n  applyTweaks(TWEAK_DEFAULTS);\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { headline: e.target.value } }, '*');\n});\ndocument.getElementById('tweak-bg').addEventListener('change', (e) => {\n  TWEAK_DEFAULTS.bg = e.target.value;\n  applyTweaks(TWEAK_DEFAULTS);\n  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { bg: e.target.value } }, '*');\n});\n</script>\n\n\n</body></html>"</script>
