<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mega Fleet Logistics Inc. — Team Portal</title>
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Mega Fleet Logistics Inc. internal team portal.">
<link rel="canonical" href="https://megafleetai.com/">
<style>
  :root{
    --bg:#0e0e0e; --panel:#161616; --red:#C41230; --red-lt:#e11a3c;
    --ink:#f5f5f5; --muted:#8a8a8a; --line:rgba(255,255,255,.08);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(196,18,48,.16), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:48px 20px;
    -webkit-font-smoothing:antialiased;
  }
  header{text-align:center;margin-bottom:52px}
  .wordmark{
    font-weight:900;letter-spacing:3px;font-size:clamp(30px,6vw,52px);
    line-height:1;
  }
  .wordmark .f{color:var(--red)}
  .tagline{
    margin-top:14px;color:var(--muted);font-size:14px;letter-spacing:.14em;
    text-transform:uppercase;font-weight:600;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:clamp(20px,5vw,56px);
    width:100%;max-width:640px;
  }
  @media(max-width:560px){.grid{grid-template-columns:repeat(2,1fr);max-width:360px;gap:28px}}
  .app{
    display:flex;flex-direction:column;align-items:center;gap:14px;
    text-decoration:none;color:var(--ink);
    transition:transform .18s ease;
  }
  .app:hover{transform:translateY(-6px)}
  .icon{
    width:clamp(96px,22vw,132px);height:clamp(96px,22vw,132px);
    border-radius:26%;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
    box-shadow:0 12px 30px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.14);
    transition:box-shadow .2s ease, transform .2s ease;
  }
  .app:hover .icon{box-shadow:0 18px 44px rgba(196,18,48,.42), inset 0 1px 0 rgba(255,255,255,.18)}
  .icon::after{ /* glossy highlight */
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,.16),transparent 42%);
    pointer-events:none;
  }
  .icon svg{width:52%;height:52%;position:relative;z-index:1}
  .i-driver{background:linear-gradient(160deg,#2b2b2b,#101010)}
  .i-pay{background:linear-gradient(160deg,#d21534,#8f0d24)}
  .i-agents{background:linear-gradient(160deg,#3a3a3a,#1a1a1a)}
  .label{font-size:15px;font-weight:600;letter-spacing:.01em}
  .sub{font-size:12px;color:var(--muted);margin-top:-8px;text-align:center;max-width:150px;line-height:1.35}
  footer{margin-top:60px;color:var(--muted);font-size:12px;letter-spacing:.05em;text-align:center}
  footer .dot{color:var(--red);margin:0 8px}
</style>
</head>
<body>
  <header>
    <div class="wordmark">MEGA<span class="f">FLEET</span></div>
    <div class="tagline">Team Portal</div>
  </header>

  <main class="grid">
    <a class="app" href="https://megafleet-j5k7rjui.manus.space" target="_blank" rel="noopener">
      <span class="icon i-driver" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 5.5h13v9H1z"/><path d="M14 8h4l3 3v3.5h-7z"/>
          <circle cx="6" cy="17" r="1.9"/><circle cx="17.5" cy="17" r="1.9"/>
        </svg>
      </span>
      <span class="label">Driver Info</span>
      <span class="sub">Share driver details with brokers</span>
    </a>

    <a class="app" href="https://megafleetpay-kxkqjvmf.manus.space" target="_blank" rel="noopener">
      <span class="icon i-pay" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="5" width="20" height="14" rx="2.5"/><path d="M2 9.5h20"/><path d="M6 15h4"/>
        </svg>
      </span>
      <span class="label">Payments</span>
      <span class="sub">Charge cards for transactions</span>
    </a>

    <a class="app" href="/agents">
      <span class="icon i-agents" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8.5" cy="9" r="2.6"/><path d="M3.5 18.5c0-2.8 2.2-4.6 5-4.6s5 1.8 5 4.6"/>
          <circle cx="16.5" cy="10" r="2.1"/><path d="M15 14.2c2.4.2 4.5 1.8 4.5 4.3"/>
        </svg>
      </span>
      <span class="label">Agents</span>
      <span class="sub">Broker partner site</span>
    </a>
  </main>

  <footer>Mega Fleet Logistics Inc. <span class="dot">•</span> Authorized personnel only</footer>
</body>
</html>
